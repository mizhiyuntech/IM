# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# AndroidX
android.useAndroidX=true

# Only build 64-bit architectures for Android 16 (API 36) compatibility.
# 32-bit architectures (armeabi-v7a, x86) have 16KB page alignment issues
# that cause crashes on Android 16 devices.
reactNativeArchitectures=arm64-v8a,x86_64

# Enable the new architecture (Fabric + TurboModules)
newArchEnabled=true

# Use Hermes JS engine
hermesEnabled=true

# Enable edge-to-edge display support (required for Android 16)
edgeToEdgeEnabled=true
